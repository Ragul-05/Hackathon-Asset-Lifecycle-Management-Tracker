spring.application.name=InventoryManagement
server.port = 8091
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
security.jwt.secret=suihdfuewhfyewfhyurgyweucfyeeferhfuyerhycnerhyfnhreyfg
security.jwt.expiration-seconds=36000

# CORS (adjust origins as needed)
app.cors.allowed-origins=http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Cloudinary
cloudinary.cloud-name=ToDoApp
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=inventory-assets


# Gemini API
gemini.api-key=${GEMINI_API_KEY}
